name: TypeCheck

on:
  pull_request:
    paths:
      - "**.py"
      - "pyrightconfig.json"
      - ".github/workflows/type-check.yml"
  push:
    paths:
      - "**.py"
      - "pyrightconfig.json"
      - ".github/workflows/type-check.yml"

jobs:
  pyright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Archipelago/

    steps:
      - name: Checkout Archipelago
        uses: actions/checkout@v6
        with:
          repository: JKLeckr/Archipelago
          path: Archipelago
          ref: ${{ (github.ref_name == 'dev' || github.head_ref == 'dev') && 'base-dev' || 'base' }}

      - name: Checkout Cuphead
        uses: actions/checkout@v6
        with:
          path: Archipelago/worlds/cuphead

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip pyright==1.1.409
          python ModuleUpdate.py --append "WebHostLib/requirements.txt" --force --yes

      - name: "Run pyright"
        working-directory: Archipelago/worlds/cuphead
        run: pyright -p pyrightconfig.json
