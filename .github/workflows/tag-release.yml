name: TagRelease

on:
  workflow_dispatch:
      inputs:
        release_tag:
          description: "Tag to publish draft release assets to (required for manual runs)"
          required: false
          type: string
  push:
    tags:
      - "*"
      - "!*norel*"

jobs:
  create-build-release:
    name: Create, Build, and Upload Release
    runs-on: ubuntu-latest
    steps:
      - name: Set Env
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "No release tag available. For workflow_dispatch, provide inputs.release_tag."
            exit 1
          fi

          echo "RELEASE_VERSION=${TAG}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        #with:
        #  fetch-depth: 0  # Fetch all history for possible versioning

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install reqs
        run: pip install typing-extensions

      - name: Clean project directory
        run: |
          # Move examples dir and genapjson out as they are not needed in the apworld
          mv examples ..
          mv tools/genapjson.py ..
          # Remove unnecessary files and directories
          find . -type d -name "__pycache__" -exec rm -rf {} \; 2>/dev/null
          find . -type d -name ".ruff_cache" -exec rm -rf {} \; 2>/dev/null
          rm -rf .git .github .gitignore
          rm -rf extras
          rm -rf tools
          rm -f ruff.toml
          rm -f pyrightconfig.json

      - name: Generate archipelago.json
        working-directory: ../
        run: |
          export SIMPLE_VERSION=$(printf '%s\n' "${{ env.RELEASE_VERSION }}" | sed 's/-.*//; s/\.[0-9]\+$//')
          python ./genapjson.py -o ./archipelago.json ./Archipelago-cuphead/ -m ${SIMPLE_VERSION}

      - name: Build ZIP package
        working-directory: ../
        run: |
          mv Archipelago-cuphead cuphead
          zip -r cuphead.zip archipelago.json cuphead -x "*.git*" "*.github*" "*_pycache_*" "examples/" "*.ruff_cache*" "genapjson.py"
          mv cuphead Archipelago-cuphead
          mv cuphead.zip cuphead.apworld

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          name: APWorld ${{ env.RELEASE_VERSION }}
          token: ${{ secrets.AP_TOKEN }}
          files: |
            ../cuphead.apworld
            ../examples/*
