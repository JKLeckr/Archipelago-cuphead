name: LevelRuleDefsSchemaCheck

on:
  pull_request:
    paths:
      - "**.py"
      - "ruff.toml"
      - ".github/workflows/levelruledefs-schema-check.yml"
  push:
    paths:
      - "**.py"
      - "ruff.toml"
      - ".github/workflows/levelruledefs-schema-check.yml"

jobs:
  checklevelrulesjson:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Archipelago/

    steps:
      - name: Checkout Archipelago
        uses: actions/checkout@v4
        with:
          repository: JKLeckr/Archipelago
          path: Archipelago
          ref: base

      - name: Checkout Cuphead
        uses: actions/checkout@v4
        with:
          path: Archipelago/worlds/cuphead

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip jsonschema
          python ModuleUpdate.py --append "WebHostLib/requirements.txt" --force --yes

      - name: "Run checklevelrulesjson.py"
        working-directory: Archipelago/worlds/cuphead
        run: python ./tools/genlevelruleschema.py --yes

      - name: "Run checklevelrulesjson.py"
        working-directory: Archipelago/worlds/cuphead
        run: python ./tools/checklevelrulesjson.py --yes ./world/rules/data/levelruledefs.json ./schemas/levelrules.generated.schema.json
